name: Monorepo CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BACKEND_IMAGE: ghcr.io/reportajgo/reportajgo-backend
  FRONTEND_IMAGE: ghcr.io/reportajgo/reportajgo-frontend

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
        env:
          DATABASE_URL: postgresql://reportajgo:reportajgo@localhost:5432/reportajgo_backend?schema=public
      - run: npm run typecheck
      - run: npm run build
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json
      - working-directory: website
        run: npm ci
      - working-directory: website
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://reportajgo:reportajgo@localhost:5432/reportajgo_frontend?schema=public
      - working-directory: website
        run: npm run build
        env:
          DATABASE_URL: postgresql://reportajgo:reportajgo@localhost:5432/reportajgo_frontend?schema=public
          NEXTAUTH_SECRET: build-time-placeholder
          NEXTAUTH_URL: http://localhost:3000
          AGENT_API_KEY: build-time-placeholder

  build-and-push:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
      - uses: docker/build-push-action@v6
        with:
          context: website
          file: website/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.deploy-preflight.outputs.ready }}
    steps:
      - id: deploy-preflight
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -n "$VPS_HOST" ] && [ -n "$VPS_USER" ] && [ -n "$VPS_SSH_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Skipping deploy because VPS_HOST, VPS_USER, or VPS_SSH_KEY is not configured."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.deploy-preflight.outputs.ready == 'true'
      - uses: appleboy/scp-action@v0.1.7
        if: steps.deploy-preflight.outputs.ready == 'true'
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          source: "docker-compose.production.yml,Caddyfile"
          target: "/opt/reportajgo"
      - uses: appleboy/ssh-action@v1.2.0
        if: steps.deploy-preflight.outputs.ready == 'true'
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            cd /opt/reportajgo
            test -f .env
            test -f backend.env
            test -f frontend.env
            test -f bot.env
            mv -f docker-compose.production.yml docker-compose.yml

            # 1. Reclaim space BEFORE pulling new layers, so a full disk can't
            # fail the pull half-way with "no space left on device".
            #
            # Images and build cache only — deliberately NOT `system prune
            # --volumes`. That flag removes every volume not attached to a
            # running container, and the database lives in the named volumes
            # backend_pgdata / frontend_pgdata. Any moment the stack is down
            # (reboot, OOM kill, a previous failed deploy) they count as unused
            # and would be deleted here, silently, before the pull.
            docker image prune -f || true
            docker builder prune -f || true

            # 2. Pull and deploy new images
            docker compose pull
            docker compose up -d --remove-orphans
            docker compose up -d --force-recreate caddy

            # 3. Drop the superseded images now the new ones are running. Safe:
            # images backing running containers are in use and are kept.
            docker image prune -a -f || true

  cleanup-ghcr:
    needs: deploy
    if: needs.deploy.outputs.ready == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete old GHCR image versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
          KEEP_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail

          cleanup_package() {
            local package_name="$1"
            echo "Cleaning old versions for ${package_name}, keeping tag ${KEEP_TAG}"

            mapfile -t version_ids < <(
              gh api --paginate "/orgs/${OWNER}/packages/container/${package_name}/versions" \
                --jq ".[] | select(((.metadata.container.tags // []) | index(\"${KEEP_TAG}\")) | not) | .id"
            )

            if [ "${#version_ids[@]}" -eq 0 ]; then
              echo "No old versions to delete for ${package_name}"
              return
            fi

            for version_id in "${version_ids[@]}"; do
              echo "Deleting ${package_name} version ${version_id}"
              gh api --method DELETE "/orgs/${OWNER}/packages/container/${package_name}/versions/${version_id}"
            done
          }

          cleanup_package "reportajgo-backend"
          cleanup_package "reportajgo-frontend"