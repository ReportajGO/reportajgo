# Cap every container's logs so an error storm can never fill the disk again.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  backend-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: reportajgo
      POSTGRES_PASSWORD: ${BACKEND_POSTGRES_PASSWORD}
      POSTGRES_DB: reportajgo_backend
    volumes:
      - backend_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reportajgo -d reportajgo_backend"]
      interval: 5s
      timeout: 5s
      retries: 10

  frontend-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: reportajgo
      POSTGRES_PASSWORD: ${FRONTEND_POSTGRES_PASSWORD}
      POSTGRES_DB: reportajgo_frontend
    volumes:
      - frontend_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reportajgo -d reportajgo_frontend"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend-app:
    image: ghcr.io/reportajgo/reportajgo-backend:latest
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ./backend.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://reportajgo:${BACKEND_POSTGRES_PASSWORD}@backend-postgres:5432/reportajgo_backend?schema=public
      REDIS_URL: redis://redis:6379
      DASHBOARD_BIND: 0.0.0.0
      WEBSITE_API_URL: http://frontend:3000
      # ── Publishing config (see the identical block on backend-worker) ──
      # Non-secret operational settings, version-controlled here so they ship with
      # the stack instead of being hand-synced into backend.env on the server.
      # These OVERRIDE backend.env (compose `environment` beats `env_file`): change
      # them HERE, not in backend.env, or the edit won't take effect. Secrets (bot
      # token, DB password) stay in backend.env. Keep this block identical in both
      # backend services — the app schedules the platform siblings, the worker
      # publishes them, so both must agree on which platforms are enabled.
      ENABLED_PLATFORMS: TELEGRAM,INSTAGRAM
      TELEGRAM_CHANNEL_ID: "@reportajgo"
      INSTAGRAM_PUBLISHER: web
      INSTAGRAM_HEADLESS: "false"
      INSTAGRAM_BROWSER_CHANNEL: ""
      BRAND_TELEGRAM_URL: https://t.me/reportajgo
      BRAND_INSTAGRAM_URL: https://www.instagram.com/reportajgo
      BRAND_YOUTUBE_URL: https://www.youtube.com/@ReportajGo
    command: sh -c "npx prisma migrate deploy && npm run start:app"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const p=process.env.DASHBOARD_PORT||3010;fetch('http://127.0.0.1:'+p+'/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      backend-postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  backend-worker:
    image: ghcr.io/reportajgo/reportajgo-backend:latest
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ./backend.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://reportajgo:${BACKEND_POSTGRES_PASSWORD}@backend-postgres:5432/reportajgo_backend?schema=public
      REDIS_URL: redis://redis:6379
      WEBSITE_API_URL: http://frontend:3000
      # ── Publishing config (see the identical block on backend-app) ──
      # Non-secret operational settings, version-controlled here so they ship with
      # the stack instead of being hand-synced into backend.env on the server.
      # These OVERRIDE backend.env (compose `environment` beats `env_file`): change
      # them HERE, not in backend.env, or the edit won't take effect. Secrets (bot
      # token, DB password) stay in backend.env.
      #   TELEGRAM_CHANNEL_ID  — was @my_special_musics on the server; posts now go
      #                          to the real channel.
      #   INSTAGRAM_PUBLISHER  — was defaulting to `graph` (Meta API, unconfigured
      #                          → "META_IG_BUSINESS_ID is not set"); `web` uses the
      #                          browser session at .secrets/instagram-state.json.
      #   INSTAGRAM_BROWSER_CHANNEL="" — the slim image has no real Chrome; empty
      #                          means Playwright's bundled Chromium.
      ENABLED_PLATFORMS: TELEGRAM,INSTAGRAM
      TELEGRAM_CHANNEL_ID: "@reportajgo"
      INSTAGRAM_PUBLISHER: web
      INSTAGRAM_HEADLESS: "false"
      INSTAGRAM_BROWSER_CHANNEL: ""
      BRAND_TELEGRAM_URL: https://t.me/reportajgo
      BRAND_INSTAGRAM_URL: https://www.instagram.com/reportajgo
      BRAND_YOUTUBE_URL: https://www.youtube.com/@ReportajGo
    # Mounted state for the worker (the only container that generates media +
    # publishes):
    #  - ./.secrets: Higgsfield OAuth token store (gitignored, not in the image).
    #    RW so rotated refresh tokens persist. Copy higgsfield-oauth.json here.
    #  - ./.instagram-profile: the logged-in Chromium profile the Instagram "web"
    #    publisher reuses. Create it once with `npm run instagram:login`, then copy
    #    the folder here. RW so Instagram can refresh its session.
    volumes:
      - ./.secrets:/app/.secrets
      - ./.instagram-profile:/app/.instagram-profile
    # Start a virtual display (24-bit) for the headed Instagram Chromium, then run
    # the worker. Xvfb -ac disables X access control so no xauth is needed, and it's
    # best-effort (backgrounded) — if the display can't start, the worker still runs
    # (only Instagram web posting needs it; media gen + Telegram + website don't).
    command: ["sh", "-c", "(Xvfb :99 -screen 0 1920x1080x24 -ac -nolisten tcp >/tmp/xvfb.log 2>&1 &) ; export DISPLAY=:99 ; exec npm run start:worker"]
    depends_on:
      backend-app:
        condition: service_healthy
      redis:
        condition: service_healthy

  telegram-bot:
    image: ghcr.io/reportajgo/reportajgo-backend:latest
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ./backend.env
      - ./bot.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://reportajgo:${BACKEND_POSTGRES_PASSWORD}@backend-postgres:5432/reportajgo_backend?schema=public
      REDIS_URL: redis://redis:6379
      WEBSITE_API_URL: http://frontend:3000
    command: npm run start:bot
    depends_on:
      backend-app:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: ghcr.io/reportajgo/reportajgo-frontend:latest
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - ./frontend.env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://reportajgo:${FRONTEND_POSTGRES_PASSWORD}@frontend-postgres:5432/reportajgo_frontend?schema=public
    command: sh -c "npx prisma migrate deploy && npm run admin:ensure && npm run start"
    depends_on:
      frontend-postgres:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN:-reportajgo.uz}
      ACME_EMAIL: ${ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend

volumes:
  backend_pgdata:
  frontend_pgdata:
  redisdata:
  caddy_data:
  caddy_config:
